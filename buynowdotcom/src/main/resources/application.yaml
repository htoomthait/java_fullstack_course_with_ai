api:
  prefix: "api/v1"
server:
  port: 8080
spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  application:
    name: buynowdotcom
  datasource:
    url: jdbc:mysql://localhost:3306/db_buy_now_dot_com?useSSL=false&serverTimezone=Asia/Yangon
    username: db_user
    password: "Abcd1234$"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
